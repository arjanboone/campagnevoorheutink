<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pre-order · De omweg is de vaste route</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #C0392B;
    color: white;
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.04) 0px,
        rgba(0,0,0,0.04) 1px,
        transparent 1px,
        transparent 40px
      );
    pointer-events: none;
  }

  .kaart {
    position: relative;
    z-index: 1;
    max-width: 520px;
    width: 100%;
    opacity: 0;
    transform: translateY(16px);
    animation: opkomen 0.7s 0.1s ease forwards;
  }

  @keyframes opkomen {
    to { opacity: 1; transform: translateY(0); }
  }

  .label {
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 20px;
    display: block;
    opacity: 0;
    animation: opkomen 0.7s 0.2s ease forwards;
  }

  .titel {
    font-family: 'Fraunces', serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 700;
    line-height: 1.0;
    color: white;
    margin-bottom: 8px;
    opacity: 0;
    animation: opkomen 0.7s 0.3s ease forwards;
  }

  .subtitel {
    font-family: 'Fraunces', serif;
    font-size: clamp(14px, 3vw, 18px);
    font-weight: 300;
    font-style: italic;
    color: rgba(255,255,255,0.7);
    margin-bottom: 40px;
    line-height: 1.5;
    opacity: 0;
    animation: opkomen 0.7s 0.4s ease forwards;
  }

  .lijn {
    height: 1px;
    background: rgba(255,255,255,0.15);
    margin-bottom: 40px;
    opacity: 0;
    animation: opkomen 0.7s 0.45s ease forwards;
  }

  .form-blok {
    opacity: 0;
    animation: opkomen 0.7s 0.5s ease forwards;
  }

  .veld {
    margin-bottom: 16px;
  }

  .veld label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }

  .veld input,
  .veld textarea {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 3px;
    padding: 13px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: white;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }

  .veld input::placeholder,
  .veld textarea::placeholder {
    color: rgba(255,255,255,0.25);
  }

  .veld input:focus,
  .veld textarea:focus {
    border-color: rgba(255,255,255,0.6);
  }

  .veld input.fout,
  .veld textarea.fout {
    border-color: rgba(255,200,200,0.8);
  }

  .twee-kolommen {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .verstuur {
    width: 100%;
    margin-top: 24px;
    background: white;
    border: none;
    border-radius: 3px;
    padding: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #C0392B;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .verstuur:hover { background: rgba(255,255,255,0.9); }
  .verstuur:active { transform: scale(0.99); }
  .verstuur:disabled { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.6); cursor: default; }

  .foutmelding {
    font-size: 11px;
    color: rgba(255,200,200,0.9);
    margin-top: 10px;
    min-height: 16px;
  }

  /* Bevestiging */
  .bevestiging {
    display: none;
    text-align: center;
    padding: 40px 0;
  }
  .bevestiging.zichtbaar {
    display: block;
    animation: opkomen 0.5s ease forwards;
  }
  .bev-check {
    font-size: 48px;
    margin-bottom: 20px;
  }
  .bev-titel {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 700;
    color: white;
    margin-bottom: 12px;
  }
  .bev-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    line-height: 1.8;
  }

  @media (max-width: 480px) {
    .twee-kolommen { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="kaart">
  <span class="label">De campagne · Het verhaal · Soulground</span>

  <div class="titel">De omweg<br>is de vaste<br>route.</div>
  <div class="subtitel">Pre-order het boek.</div>

  <div class="lijn"></div>

  <div id="form-blok" class="form-blok">
    <div class="veld">
      <label>Naam</label>
      <input type="text" id="naam" placeholder="Voor- en achternaam">
    </div>

    <div class="twee-kolommen">
      <div class="veld">
        <label>Aantal exemplaren</label>
        <input type="number" id="aantal" placeholder="1" min="1" value="1">
      </div>
      <div class="veld">
        <label>E-mailadres</label>
        <input type="email" id="email" placeholder="jouw@mail.nl">
      </div>
    </div>

    <div class="veld">
      <label>Bezorgadres</label>
      <input type="text" id="adres" placeholder="Straat en huisnummer">
    </div>

    <div class="twee-kolommen">
      <div class="veld">
        <label>Postcode</label>
        <input type="text" id="postcode" placeholder="1234 AB">
      </div>
      <div class="veld">
        <label>Plaats</label>
        <input type="text" id="plaats" placeholder="Stad">
      </div>
    </div>

    <button class="verstuur" id="verstuur-btn" onclick="verstuur()">Pre-order nu →</button>
    <div class="foutmelding" id="foutmelding"></div>
  </div>

  <div class="bevestiging" id="bevestiging">
    <div class="bev-check">✓</div>
    <div class="bev-titel">Pre-order ontvangen.</div>
    <div class="bev-sub">
      Je hoort van ons.<br>
      De omweg is de vaste route.
    </div>
  </div>
</div>

<script>
  async function verstuur() {
    const naam = document.getElementById('naam').value.trim();
    const aantal = document.getElementById('aantal').value.trim();
    const email = document.getElementById('email').value.trim();
    const adres = document.getElementById('adres').value.trim();
    const postcode = document.getElementById('postcode').value.trim();
    const plaats = document.getElementById('plaats').value.trim();
    const fout = document.getElementById('foutmelding');
    const btn = document.getElementById('verstuur-btn');

    // Reset
    ['naam','aantal','email','adres','postcode','plaats'].forEach(id => {
      document.getElementById(id).classList.remove('fout');
    });

    if (!naam) { document.getElementById('naam').classList.add('fout'); fout.textContent = 'Vul je naam in.'; return; }
    if (!email) { document.getElementById('email').classList.add('fout'); fout.textContent = 'Vul je e-mailadres in.'; return; }
    if (!adres) { document.getElementById('adres').classList.add('fout'); fout.textContent = 'Vul je adres in.'; return; }
    if (!postcode) { document.getElementById('postcode').classList.add('fout'); fout.textContent = 'Vul je postcode in.'; return; }
    if (!plaats) { document.getElementById('plaats').classList.add('fout'); fout.textContent = 'Vul je woonplaats in.'; return; }

    fout.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Wordt verstuurd...';

    // Formspree — vervang YOUR_FORM_ID door jouw ID
    const FORMSPREE_URL = 'https://formspree.io/f/xvzwwnaw';

    try {
      const resp = await fetch(FORMSPREE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          onderwerp: 'Pre-order: De omweg is de vaste route',
          naam, aantal, email, adres, postcode, plaats
        })
      });

      if (resp.ok) {
        document.getElementById('form-blok').style.display = 'none';
        document.getElementById('bevestiging').classList.add('zichtbaar');
      } else {
        fout.textContent = 'Er ging iets mis. Probeer opnieuw.';
        btn.disabled = false;
        btn.textContent = 'Pre-order nu →';
      }
    } catch(e) {
      fout.textContent = 'Geen verbinding. Probeer opnieuw.';
      btn.disabled = false;
      btn.textContent = 'Pre-order nu →';
    }
  }
</script>

</body>
</html>
